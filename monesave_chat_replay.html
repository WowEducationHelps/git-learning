<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Monesave Conversation Replay</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: "Space Grotesk", sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 40px 20px;
  color: white;
}

.phone {
  width: 390px;
  height: 844px;
  background: #000;
  border-radius: 42px;
  padding: 14px;
  box-shadow: 0 30px 80px rgba(0,0,0,.45);
}

.phone-inner {
  width: 100%;
  height: 100%;
  background: #111827;
  border-radius: 32px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.status-bar {
  display: flex;
  justify-content: space-between;
  padding: 16px 20px 8px;
  font-size: 14px;
  color: #cbd5e1;
}

.chat-header {
  padding: 14px 18px;
  border-bottom: 1px solid rgba(255,255,255,.08);
  display: flex;
  align-items: center;
  gap: 12px;
  background: rgba(255,255,255,.03);
}

.avatar {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  background: linear-gradient(135deg, #10b981, #14b8a6);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
}

.chat-meta h1 {
  font-size: 16px;
  margin: 0;
}

.chat-meta p {
  margin: 2px 0 0;
  font-size: 12px;
  color: #94a3b8;
}

.messages {
  flex: 1;
  overflow-y: auto;
  padding: 18px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.message {
  max-width: 82%;
  padding: 12px 14px;
  border-radius: 18px;
  line-height: 1.45;
  word-wrap: break-word;
  white-space: pre-wrap;
}

.message.them {
  align-self: flex-start;
  background: #1f2937;
  border-bottom-left-radius: 6px;
}

.message.me {
  align-self: flex-end;
  background: #2563eb;
  border-bottom-right-radius: 6px;
}

.time {
  margin-top: 8px;
  font-size: 11px;
  opacity: .75;
}

.footer {
  padding: 14px 18px;
  border-top: 1px solid rgba(255,255,255,.08);
  background: rgba(255,255,255,.03);
  color: #94a3b8;
  font-size: 13px;
}

@media (max-width: 480px) {
  body {
    padding: 0;
  }

  .phone {
    width: 100vw;
    height: 100vh;
    border-radius: 0;
    padding: 0;
  }

  .phone-inner {
    border-radius: 0;
  }
}
</style>
</head>

<body>
<div class="phone">
  <div class="phone-inner">

    <div class="status-bar">
      <span>9:41</span>
      <span>● ● ●</span>
    </div>

    <div class="chat-header">
      <div class="avatar">M</div>

      <div class="chat-meta">
        <h1>Monesave Support</h1>
        <p>Read-only conversation replay</p>
      </div>
    </div>

    <div class="messages" id="messages"></div>

    <div class="footer">
      Messages are read-only
    </div>

  </div>
</div>

<script>
const messages = [{"id": 1, "sender": "me", "text": "Hi, I have some questions about the ring.", "time": "4/18/26, 12:42 PM"}, {"id": 2, "sender": "them", "text": "Hi there - Yes, what’s the question regarding Orukka", "time": "4/18/26, 12:42 PM"}, {"id": 3, "sender": "me", "text": "Is there a way to reach the company by phone?", "time": "4/18/26, 12:44 PM"}, {"id": 4, "sender": "them", "text": "You have a query regarding the phone and you want to clarify by a phone call? Of course", "time": "4/18/26, 12:44 PM"}, {"id": 5, "sender": "them", "text": "This is a WhatsApp number. It will direct to a member for the team.", "time": "4/18/26, 12:45 PM"}, {"id": 6, "sender": "them", "text": "You can call via WhatsApp here", "time": "4/18/26, 12:45 PM"}, {"id": 7, "sender": "me", "text": "Okay, can I call now?", "time": "4/18/26, 12:45 PM"}, {"id": 8, "sender": "them", "text": "Yes", "time": "4/18/26, 12:45 PM"}, {"id": 9, "sender": "me", "text": "", "time": "4/18/26, 12:47 PM"}, {"id": 10, "sender": "me", "text": "Hi,\nCan you please let me know if there are any plans to introduce fees associated to the ring or access to the app?", "time": "4/18/26, 6:10 PM"}, {"id": 11, "sender": "them", "text": "There are no plans to introduce any subscription or fees with the current ring. There is however, a conversation with partners to introduce concierge services but that would be options add on for users.", "time": "4/18/26, 6:19 PM"}, {"id": 12, "sender": "me", "text": "Thanks for letting me know.  What do you mean by concierge services?", "time": "4/18/26, 6:20 PM"}, {"id": 13, "sender": "them", "text": "The concierge service and add on is still being defined. We hope to communicate that with the sponsoring bank once that’s signed", "time": "4/18/26, 6:31 PM"}, {"id": 14, "sender": "me", "text": "Hi,\nI just tried to order the ring through the app and it charged it as a top up.", "time": "4/18/26, 7:17 PM"}, {"id": 15, "sender": "me", "text": "<Media omitted>", "time": "4/18/26, 7:17 PM"}, {"id": 16, "sender": "me", "text": "<Media omitted>", "time": "4/18/26, 7:17 PM"}, {"id": 17, "sender": "me", "text": "I've since been able to purchase it through the website (Order #1032), but how can I get the top up credited back to the original form of payment?", "time": "4/18/26, 7:18 PM"}, {"id": 18, "sender": "me", "text": "<Media omitted>", "time": "4/18/26, 7:31 PM"}, {"id": 19, "sender": "me", "text": "Also, it says my username is null. How do I go about fixing this?", "time": "4/18/26, 7:31 PM"}, {"id": 20, "sender": "them", "text": "This is confirmed that this has been refunded back to the original payment method.", "time": "4/18/26, 7:33 PM"}, {"id": 21, "sender": "me", "text": "Great! Thanks for doing that.", "time": "4/18/26, 7:34 PM"}, {"id": 22, "sender": "them", "text": "This issue has been reported by some users. Some usernames intermittently set to null. We are deploying a fix to the app stores over the coming days", "time": "4/18/26, 7:36 PM"}, {"id": 23, "sender": "me", "text": "Okay, thanks for addressing that concern.", "time": "4/18/26, 7:43 PM"}, {"id": 24, "sender": "them", "text": "You are welcome - any further issues, do let us know. Your Orukka will be configured and dispatched on Monday. A tracking number will be sent to your email.", "time": "4/18/26, 7:58 PM"}, {"id": 25, "sender": "me", "text": "Great, I'll keep an eye out for that. Is it possible for you to add signature delivery on the package? I want to make sure it doesn't get stolen.", "time": "4/18/26, 8:02 PM"}, {"id": 26, "sender": "them", "text": "All Orukka Ring and Braclets require signatures, due to the package security", "time": "4/18/26, 8:03 PM"}, {"id": 27, "sender": "me", "text": "Okay. 👍🏿", "time": "4/18/26, 8:03 PM"}, {"id": 28, "sender": "me", "text": "<Media omitted>", "time": "4/18/26, 8:04 PM"}, {"id": 29, "sender": "me", "text": "When can I expect this to update now that part of it is being refunded? There is a $5 test deposit that I'd like to keep in the account. My goal is to only refund the larger amount ($255).", "time": "4/18/26, 8:05 PM"}, {"id": 30, "sender": "them", "text": "We have triggered the refund it might take one to three business days to hit your account. We can expect your app to be reflected in the next few hours also. <This message was edited>", "time": "4/18/26, 8:13 PM"}, {"id": 31, "sender": "me", "text": "Thank you!", "time": "4/18/26, 8:31 PM"}, {"id": 32, "sender": "me", "text": "Hello, hope you all are doing well. I’m reaching out with a few questions. My ring is currently in transit and once it arrives I’d like to have an understanding of what to expect. Here are my questions:\n- How do I approve any security validations needed when making a high value purchase? In the past, I’ve had credit/debit card companies deny a transaction until I confirm via text, phone call, or an app that the purchase is legitimate.\n- ⁠In the Monesave app, it mentions that if the ring is lost or stolen there is a fee for a replacement ring. Is the fee the same as buying a new ring?\n- ⁠Once the expiration date of the Mastercard is passed, how do I update the ring with a new card?\nThank you.", "time": "4/22/26, 9:52 AM"}, {"id": 33, "sender": "them", "text": "Here are responses to your questions:\n- How do I approve any security validations needed when making a high value purchase? In the past, I’ve had credit/debit card companies deny a transaction until I confirm via text, phone call, or an app that the purchase is legitimate.\nFor high value purchases, you will need to validate the transaction with a 6 digit pin. This will be available on your app and is provided from Mastercard/Visa. For security reasons, we cannot change and you can’t either. Given the increased risks associated with Rings and Bracelets.\n- ⁠In the Monesave app, it mentions that if the ring is lost or stolen there is a fee for a replacement ring. Is the fee the same as buying a new ring?\nLost or Stolen rings can be replaced at a discount. Specific discounts are on a case by case basis but usually around 25% cheaper than full price.\n- ⁠Once the expiration date of the Mastercard is passed, how do I update the ring with a new card?\nUnlike usual cards, there is increased security and certificate on rings and bracelets depending on the customisations in place. When the expiry date of the Mastercard or Visa is due, we recertify the chips remotely or post you a new wearable. There is no cost associated with Device certifications.\nWelcome to Orukka!", "time": "4/22/26, 10:00 AM"}, {"id": 34, "sender": "me", "text": "Perfect! Thanks so much for the answers. 👍🏿", "time": "4/22/26, 10:06 AM"}, {"id": 35, "sender": "them", "text": "Any further questions, do let us know", "time": "4/22/26, 10:49 AM"}, {"id": 36, "sender": "me", "text": "Will do!", "time": "4/22/26, 11:07 AM"}, {"id": 37, "sender": "me", "text": "Hi, I have three questions. <This message was edited>", "time": "4/25/26, 5:27 PM"}, {"id": 38, "sender": "me", "text": "- In my previous message I asked about my username becoming null on my account. It has happened again. Would this interfere with my ability to make purchases? <This message was edited>", "time": "4/25/26, 5:28 PM"}, {"id": 39, "sender": "me", "text": "<Media omitted>", "time": "4/25/26, 5:28 PM"}, {"id": 40, "sender": "me", "text": "- I use a Unihertz Jelly Star phone. In future updates of the Monesave app, can you all please consider smaller screen sizes? Currently I only have access to three of the options available. On my larger devices, I can see the different options.  This would be a major issue if I lost the ring and needed to block it.", "time": "4/25/26, 5:30 PM"}, {"id": 41, "sender": "me", "text": "<Media omitted>", "time": "4/25/26, 5:30 PM"}, {"id": 42, "sender": "me", "text": "- Once I receive my ring, by blocking and unblocking the ring how quickly does that take effect? I'd like to test it out to see how reliable it is.", "time": "4/25/26, 5:31 PM"}, {"id": 43, "sender": "me", "text": "Thank you!", "time": "4/25/26, 5:32 PM"}, {"id": 44, "sender": "them", "text": "Hi there - the fix for the app has been pushed to the app stores. It will be released in the next iteration hopefully end of the next week. The username name being “null” has no impact on spending your ring at all", "time": "4/25/26, 5:40 PM"}, {"id": 45, "sender": "them", "text": "Thanks for that feedback. We will optimise for the screen size the next iteration. If you lost your ring before we are able to fixed this, please also send an email to support@monesave.com. We have an internal AI routing in place. Emails with “lost ring” as the subject or body is automatically mapped to the sender and prioritised", "time": "4/25/26, 5:42 PM"}, {"id": 46, "sender": "them", "text": "The notification is timestamped and is immediate. All banks and payment systems in the Mastercard, and Visa network are automatically updated also. Usually this take 0.1 seconds from when you click block on the App", "time": "4/25/26, 5:45 PM"}, {"id": 47, "sender": "me", "text": "Great, thank you for the answers!", "time": "4/25/26, 5:54 PM"}, {"id": 48, "sender": "me", "text": "Hi, I have two questions.\n- Will I need to enter the card’s PIN after every transaction? I’m hopeful this is not the case since it will slow down most transactions.\n- ⁠Is there an anti-embarrassment mode in case there aren’t enough funds in my Monesave account? Similar to this:\nhttps://www.curve.com/stop-card-declines/", "time": "4/27/26, 12:22 AM"}, {"id": 49, "sender": "them", "text": "Regarding the PIN, for our USA customers, the limit is driven by Mastercard, Visa and the Fed. Currently in the USA, PIN is only required for contactless payments over $100\nWe currently do not not an anti embarrassment mode but we are finalising an agreement with Curve such that Curve users can link thier cards to our rings. So our users will get the Anti embarrassment feature for free.\nThe collaboration with Curve is going live on the 15th of May.", "time": "4/27/26, 3:16 AM"}, {"id": 50, "sender": "me", "text": "Great, thank you!", "time": "4/27/26, 7:31 AM"}, {"id": 51, "sender": "me", "text": "I have another question for you. Once the collaboration goes live, will I be able to have a more seamless way of transferring money into my account with no fees? The current direct bank transfer option requires me to wire money and I don't have access to wiring money.", "time": "4/27/26, 2:52 PM"}, {"id": 52, "sender": "me", "text": "The fees are pretty high for me.", "time": "4/27/26, 2:53 PM"}, {"id": 53, "sender": "them", "text": "Yes - when collaboration goes live, it might be cheaper than Apple Pay or current card payments. But it’s worth noting that Curve handle the onboarding and funding of their own accounts and customers. So we will have no input on that.\nThe only service we provide there would be lining of your Curve card to our Orukka Ring or Bracelets. Questions on payments and top ups would be best addressed to Curve", "time": "4/27/26, 3:53 PM"}, {"id": 54, "sender": "me", "text": "I understand. Thank you.", "time": "4/27/26, 4:15 PM"}, {"id": 55, "sender": "me", "text": "Hey, I just use the ring and it was declined both times. Is there something I need to do for it to start working?", "time": "4/27/26, 8:31 PM"}, {"id": 56, "sender": "them", "text": "If you close your Monesave app and reopen this, it should be working now. The delivery date was scheduled for today. We activate the ring remotely so there is no action required from your end", "time": "4/28/26, 8:12 AM"}, {"id": 57, "sender": "me", "text": "Great, thank you. It worked. It was really fantastic. The only thing I'm having trouble with now is seeing the transaction appear in the app. I made the transaction about 30 minutes ago and it's still not reflected in the app.", "time": "4/28/26, 9:17 AM"}, {"id": 58, "sender": "them", "text": "We will look into this and revert. We do see some banks and merchants take up to an hour to load", "time": "4/28/26, 9:19 AM"}, {"id": 59, "sender": "me", "text": "Okay, thank you.", "time": "4/28/26, 9:40 AM"}, {"id": 60, "sender": "them", "text": "Actually we see this just got reflected on your app. It was deducted immediately by the merchant but took sometime to reach us", "time": "4/28/26, 9:40 AM"}, {"id": 61, "sender": "them", "text": "Usually it depends on the POS terminals used.", "time": "4/28/26, 9:40 AM"}, {"id": 62, "sender": "me", "text": "Okay, thanks again. 👍🏿", "time": "4/28/26, 9:40 AM"}, {"id": 63, "sender": "me", "text": "<Media omitted>", "time": "4/28/26, 9:41 AM"}, {"id": 64, "sender": "me", "text": "Is there anyway I can change my PIN to something more difficult?", "time": "4/28/26, 9:42 AM"}, {"id": 65, "sender": "them", "text": "Ok two points:", "time": "4/28/26, 9:42 AM"}, {"id": 66, "sender": "them", "text": "1) please don’t share your code on WhatsApp :)", "time": "4/28/26, 9:42 AM"}, {"id": 67, "sender": "them", "text": "2) That’s not your code. It should come through on your app in about 1 hour time", "time": "4/28/26, 9:43 AM"}, {"id": 68, "sender": "me", "text": "Got it. Thanks for the two points. I won't share my code again.  😅", "time": "4/28/26, 9:44 AM"}, {"id": 69, "sender": "them", "text": "0000 is the default code before it’s updated", "time": "4/28/26, 9:44 AM"}, {"id": 70, "sender": "me", "text": "Okay, sounds good.", "time": "4/28/26, 9:44 AM"}, {"id": 71, "sender": "me", "text": "Can I choose it?", "time": "4/28/26, 9:44 AM"}, {"id": 72, "sender": "them", "text": "Unfortunately you cannot and we cannot chose that for Rings and Bracelets yet", "time": "4/28/26, 9:45 AM"}, {"id": 73, "sender": "me", "text": "Okay. 👍🏿", "time": "4/28/26, 9:45 AM"}, {"id": 74, "sender": "them", "text": "Hopefully in the near future", "time": "4/28/26, 9:45 AM"}, {"id": 75, "sender": "me", "text": "Is the gold ring a fitness tracker as well?", "time": "4/28/26, 9:46 AM"}, {"id": 76, "sender": "them", "text": "At the moment, Only the black ring has a payment and fitness feature", "time": "4/28/26, 9:46 AM"}, {"id": 77, "sender": "them", "text": "The gold will clash with the fitness and payment. But we are working on this feature", "time": "4/28/26, 9:47 AM"}, {"id": 78, "sender": "me", "text": "Okay, I understand. Does the black fitness/payment ring need to be charged?", "time": "4/28/26, 9:50 AM"}, {"id": 79, "sender": "them", "text": "Yes, the fitness rings and bracelets all need to the charged.", "time": "4/28/26, 10:08 AM"}, {"id": 80, "sender": "them", "text": "The Payment rings and bracelets do not need to be charged", "time": "4/28/26, 10:08 AM"}, {"id": 81, "sender": "them", "text": "Once fitness is involved, charging is needed because of the pulse readings", "time": "4/28/26, 10:08 AM"}, {"id": 82, "sender": "me", "text": "I understand. Thanks for all the answers!", "time": "4/28/26, 11:08 AM"}, {"id": 83, "sender": "me", "text": "Hi,\nCan you please share details on the collaboration? Will US  customers be able to use Curve?  I had read previously that Curve was only available to customers in Europe. If it's not available in the US, I'd like to return the ring.", "time": "5/3/26, 10:26 AM"}, {"id": 84, "sender": "them", "text": "Think we had actually replied you here. We have no input on what Curves plans are and that’s not a condition on our end.", "time": "5/3/26, 11:17 AM"}, {"id": 85, "sender": "them", "text": "All we can disclose right now is that they were bough over in November and planning on expansion", "time": "5/3/26, 11:18 AM"}, {"id": 86, "sender": "them", "text": "https://www.curve.com/blog/curve-is-joining-lloyds-banking-group/", "time": "5/3/26, 11:18 AM"}, {"id": 87, "sender": "me", "text": "Thanks for sending more details. Do you all have any plans for a more premium ring?  The ring feels really plasticky and not of a high quality. I really do love the functionality though.", "time": "5/3/26, 4:23 PM"}, {"id": 88, "sender": "them", "text": "The ceramic ring is our entry level ring. We are delighted to offer several lineups of premium rings.", "time": "5/3/26, 4:56 PM"}, {"id": 89, "sender": "them", "text": "Gold plated <This message was edited>", "time": "5/3/26, 4:56 PM"}, {"id": 90, "sender": "them", "text": "https://orukka.com/collections/wedding-bands-do-more-with-monesave-smart-payment-wedding-rings/products/monesave-bands-wedding-rings-fine-jewellery-smart-ring-wedding-bands-for-him-her-gold", "time": "5/3/26, 4:56 PM"}, {"id": 91, "sender": "them", "text": "Silver plated", "time": "5/3/26, 4:57 PM"}, {"id": 92, "sender": "them", "text": "https://orukka.com/collections/wedding-bands-do-more-with-monesave-smart-payment-wedding-rings/products/wedding-band-smart-payment-rings-fine-jewellery-smart-ring-wedding-bands-for-him-her-silver", "time": "5/3/26, 4:57 PM"}, {"id": 93, "sender": "them", "text": "Custom zircon stones", "time": "5/3/26, 4:57 PM"}, {"id": 94, "sender": "them", "text": "https://orukka.com/collections/fine-jewellery-payment-rings/products/tolani-pave-lab-diamond-bracelet-custom-designs", "time": "5/3/26, 4:57 PM"}, {"id": 95, "sender": "them", "text": "Custom lab grown diamonds (we are one of the first to offer this globally)", "time": "5/3/26, 4:59 PM"}, {"id": 96, "sender": "them", "text": "https://orukka.com/collections/fine-jewellery-payment-rings/products/tolani-pave-lab-diamond-rings-smart-payment-rings", "time": "5/3/26, 4:59 PM"}, {"id": 97, "sender": "me", "text": "Hi!\nI've been having a lot of difficulty with the ring being detected on NFC sensors. Why is this?", "time": "5/8/26, 10:57 PM"}, {"id": 98, "sender": "them", "text": "Can you clarify what you mean by difficulty? Are you trying to get your ring to do something?\nThe ring comes with NFC censors allowing users add further functionality like Opening office building (for business owners) or opening houses and safes (for users who have selected that custom option)\nYour ring had no extra function so when you try to tap a door or nfc reader, it might try to open a web page. But nothing else", "time": "5/9/26, 1:58 AM"}, {"id": 99, "sender": "me", "text": "I'm only using my ring for the function that I purchased it for which was to purchase things. When I'm at the register, at times it often takes several times to get it to work.", "time": "5/9/26, 8:26 AM"}, {"id": 100, "sender": "them", "text": "We get some comments like this. Can you share a picture of one of the cash registers in question.\nSpecifically the ring should be tapped on the WiFi symbol on the POS terminal. The cashier can also advise there the reader is. Sometimes it could be at the top, or on the side or on the screen itself,\nSome users inadvertently tap on the screen or around the box till they get the right spot luckily. The NFC reader is located on different spots depending on the terminal <This message was edited>", "time": "5/9/26, 8:40 AM"}, {"id": 101, "sender": "them", "text": "We just noticed this comment. There is 30-day money back guarantee as the Ring is a wearable. Would you like to post the ring back and get your money back?\nAfter 30 days, you can withdraw your money from the app but we would not be able to sell the ring to anyone else. Please confirm if you are still happy with the ring or would like to return it pending what’s happening with Curve in the USA", "time": "5/9/26, 8:44 AM"}, {"id": 102, "sender": "me", "text": "Thank you for your reply. The kiosk or POS systems I use are sometimes on the bus itself, so it really varies depending on the terminal and setup. I have been paying pretty close attention and have been really diligent about tapping in the correct place, including directly on the NFC/WiFi symbol when it’s visible, but I still run into issues where it takes several attempts to register.\nI also wanted to clarify the 30-day return window. Does that mean I can wait until after the new Curve rollout in the US before deciding whether to keep or return the ring, or do I need to make that decision within the current 30-day period? At this point, I think I would prefer to return it pending what happens with Curve in the US; it's important for me because of the partnership with Curve, as I want to tether my bank account to it. I think it’s a great device overall, but there are still a few things that could be improved, mainly making it more responsive and giving the ring itself a more premium feel and weight.", "time": "5/9/26, 12:17 PM"}, {"id": 103, "sender": "me", "text": "<Media omitted>", "time": "5/9/26, 12:18 PM"}, {"id": 104, "sender": "them", "text": "Thanks - we dont see the delays or responsiveness with other customers who use on train tickets. Is this picture AI generated or this is the actually Payment Station. If this is a real payment terminal, it’s suppose to be on the glass. We see a 99% low latency. Similar to debit cards. It’s unfortunate in this case. <This message was edited>", "time": "5/9/26, 12:21 PM"}, {"id": 105, "sender": "them", "text": "<Media omitted>", "time": "5/9/26, 12:22 PM"}, {"id": 106, "sender": "them", "text": "Please return the ring by post to", "time": "5/9/26, 12:25 PM"}, {"id": 107, "sender": "them", "text": "Focus on Monesave Ltd, 50 Regent Court, 1 North Bank, London, United Kingdom NW8 8UN", "time": "5/9/26, 12:26 PM"}, {"id": 108, "sender": "them", "text": "Please send via registered post. Once recieved, you will be refunded to the original payment method", "time": "5/9/26, 12:27 PM"}, {"id": 109, "sender": "me", "text": "This picture is pulled from Google. Not AI generated. Can you let me know the date it needs to be mailed by? I really want to give it as best a shot as possible before sending it back as this was something I was really excited about!", "time": "5/9/26, 12:38 PM"}, {"id": 110, "sender": "me", "text": "I ordered it on April 18th. So it looks like May 18th is the final date I have to decide by? But when would I have to mail it by?", "time": "5/9/26, 12:39 PM"}, {"id": 111, "sender": "them", "text": "As customer service reps, we really want the best for our customers and would not advise you get something you are not 100% happy and excited about.", "time": "5/9/26, 12:44 PM"}, {"id": 112, "sender": "them", "text": "Yes, you can lets us know by email or text on the 17th of May. We will disable the ring on that date. And when we received the ring, we refund to the card used to purchase.", "time": "5/9/26, 12:46 PM"}, {"id": 113, "sender": "me", "text": "Okay, I'll be sure to let you know by then. Thank you.", "time": "5/9/26, 12:47 PM"}, {"id": 114, "sender": "me", "text": "<Media omitted>", "time": "5/9/26, 12:54 PM"}, {"id": 115, "sender": "me", "text": "And I noticed sometimes the balance doesn't add up correctly. After each purchase it doesn't say the new balance. It requires me to remember what the balance was before my purchase.", "time": "5/9/26, 12:55 PM"}, {"id": 116, "sender": "me", "text": "Is there any way you could see a ledger balance that reduces after each purchase.", "time": "5/9/26, 12:55 PM"}, {"id": 117, "sender": "them", "text": "Thanks - we will query this with the bank and revert asap", "time": "5/9/26, 1:00 PM"}, {"id": 118, "sender": "me", "text": "Thank you.", "time": "5/9/26, 1:02 PM"}, {"id": 119, "sender": "them", "text": "cliftongrannum@gmail.com", "time": "5/9/26, 1:02 PM"}, {"id": 120, "sender": "them", "text": "Just to confirm this is your ID", "time": "5/9/26, 1:02 PM"}, {"id": 121, "sender": "me", "text": "Yes.", "time": "5/9/26, 1:02 PM"}, {"id": 122, "sender": "them", "text": "Thanks we are raising this", "time": "5/9/26, 1:02 PM"}, {"id": 123, "sender": "them", "text": "We are working on straight connection with banking partners. Right now the value proposition is not to have mobile phones when paying the rings. So there is some lag coming from our current US banks. We have a few more banks coming onboard that will provide quicker and cheaper updates for customers", "time": "5/9/26, 1:04 PM"}, {"id": 124, "sender": "me", "text": "Okay, thank you.", "time": "5/9/26, 1:29 PM"}, {"id": 125, "sender": "me", "text": "How about this?", "time": "5/9/26, 1:35 PM"}, {"id": 126, "sender": "them", "text": "Not at the moment. Our current banks in the USA don’t facilitate that. Other countries do that. So it’s a matter of time", "time": "5/9/26, 1:37 PM"}, {"id": 127, "sender": "them", "text": "There is a reconciliation going through overnight which should reconcile this. We have queried this and they will reverse this pending investigation", "time": "5/9/26, 6:00 PM"}, {"id": 128, "sender": "me", "text": "Thank you for both updates!", "time": "5/9/26, 6:55 PM"}, {"id": 129, "sender": "me", "text": "Hi, has the transaction been reversed? I can't tell because I don't remember what the balance was. This is a major problem because I have to keep track of the history of the balance rather than relying on the system.", "time": "5/10/26, 7:31 AM"}, {"id": 130, "sender": "them", "text": "It was reversed yesterday as already confirmed. As you can see from your app also. That’s your balance", "time": "5/10/26, 7:50 AM"}, {"id": 131, "sender": "them", "text": "<Media omitted>", "time": "5/10/26, 7:50 AM"}, {"id": 132, "sender": "them", "text": "The positive means a reversal", "time": "5/10/26, 7:50 AM"}, {"id": 133, "sender": "me", "text": "Great, thank you.", "time": "5/10/26, 9:14 AM"}, {"id": 134, "sender": "me", "text": "Hi, I just topped up the ring and it's not referencing l reflecting and I need to make a purchase.", "time": "5/11/26, 9:45 AM"}, {"id": 135, "sender": "them", "text": "Thanks for your query. We will take a look now", "time": "5/11/26, 9:47 AM"}, {"id": 136, "sender": "me", "text": "Thank you.", "time": "5/11/26, 9:48 AM"}, {"id": 137, "sender": "them", "text": "There seems to have been a lag earlier and your ring balance should have been updated within the past two hours.", "time": "5/11/26, 2:13 PM"}, {"id": 138, "sender": "me", "text": "Great, thanks for addressing that. 👍🏿", "time": "5/11/26, 3:22 PM"}, {"id": 139, "sender": "me", "text": "Hi,\nI'm seeing a charger that I don't recognize. Can you tell me about it? Enick Tan?", "time": "5/13/26, 1:43 PM"}, {"id": 140, "sender": "them", "text": "One sec. We are taking a look now", "time": "5/13/26, 1:44 PM"}, {"id": 141, "sender": "me", "text": "Also, a charge from the transit system dated from today, but I didn't take the train today.", "time": "5/13/26, 1:45 PM"}, {"id": 142, "sender": "them", "text": "That’s a delayed transaction from NYCT paygo yesterday actually. It appears you paid twice. On the way out and then a return journey. The return journey only got charged now", "time": "5/13/26, 1:48 PM"}, {"id": 143, "sender": "them", "text": "Also similar to the 11th of May. It’s possible for the charge from Trains to be delayed and charged a few hours later", "time": "5/13/26, 1:49 PM"}, {"id": 144, "sender": "me", "text": "Thanks for bringing that to my attention. With the NYCT pay go transactions, the way it works is that if you use the same card within 2 hours it's one transaction. Are the rings unable to support this?", "time": "5/13/26, 1:50 PM"}, {"id": 145, "sender": "me", "text": "It enables riders to transfer for free.", "time": "5/13/26, 1:51 PM"}, {"id": 146, "sender": "me", "text": "It would really be helpful for me to have a detailed transaction history. Is that not available?", "time": "5/13/26, 1:52 PM"}, {"id": 147, "sender": "them", "text": "Unfortunately not at the moment. We are talking to Transport providers to roll this out as part of accessibility drive. It does take time to implement that.", "time": "5/13/26, 1:55 PM"}, {"id": 148, "sender": "them", "text": "Yes we automatically send a monthly transaction list  to customers during the weeks of each month. This is following month end reconciliation.", "time": "5/13/26, 1:57 PM"}, {"id": 149, "sender": "me", "text": "Just to ensure I understand: a transaction that updates isn't possible? How is this different from when a charge is pending until a tip is made? Such as at a restaurant for example. <This message was edited>", "time": "5/13/26, 2:05 PM"}, {"id": 150, "sender": "me", "text": "Okay, thank you.", "time": "5/13/26, 2:07 PM"}, {"id": 151, "sender": "them", "text": "A transaction that updates is possible. Similar to preauthorisations at hotels, tips at restaurants or indeed certain train passes. A transaction can update anytime between 1- 7 business days", "time": "5/13/26, 2:31 PM"}, {"id": 152, "sender": "me", "text": "I understand. Can you confirm whether it would work with NYC MTA?", "time": "5/13/26, 2:33 PM"}, {"id": 153, "sender": "them", "text": "I don’t get your query. Can you clarify what you mean by “would work with NYC MTA”?", "time": "5/13/26, 2:36 PM"}, {"id": 154, "sender": "them", "text": "Orukka rings currently works with the NYC MTA. Users can tap their rings to pay and get in and out of Metro stations", "time": "5/13/26, 2:37 PM"}, {"id": 155, "sender": "me", "text": "I thought you mentioned that the rings wouldn't support this in a previous message.", "time": "5/13/26, 2:44 PM"}, {"id": 156, "sender": "me", "text": "Also, any update on this transaction? I don't see any Enick Tan where I live.", "time": "5/13/26, 2:45 PM"}, {"id": 157, "sender": "them", "text": "We don’t see this on your account at the moment. That was that probably a lag on the description and is updated now. Please check again and let us know", "time": "5/13/26, 2:46 PM"}, {"id": 158, "sender": "them", "text": "What we were referring to here was the spending caps and deals from NYC MTA. Those deals and application to rings are in progress and will take time for those agencies to implement. Unfortunately we dont have a timeframe for that", "time": "5/13/26, 2:48 PM"}, {"id": 159, "sender": "me", "text": "Yes, it's since updated. When it lags, it'll show a different merchant? Why is that?", "time": "5/13/26, 2:52 PM"}, {"id": 160, "sender": "me", "text": "I understand now. Thanks for explaining that.", "time": "5/13/26, 2:52 PM"}, {"id": 161, "sender": "me", "text": "Some feedback from me is that the delay/lag in transactions, coupled with the lack of detail on transactions it makes it difficult to keep track of spending. I'll look in my account and see the number fluctuate dramatically and I won't be able to get clarity as to why because the account hasn't updated or it will update and it'll be unclear.", "time": "5/13/26, 2:54 PM"}, {"id": 162, "sender": "them", "text": "Thanks for the feedback. We will continue to work with partner banks on real time updates. It is worth understanding that the usecase for payment rings is to reduce reliance on phones. So it might be worrying to closely track every transaction after each tap of your ring. It reduces the quality of your experience. Our current suggestion is to budget your weekly transactions and top up weekly or monthly. At month end, users get a reconciled statement and finalised transactions for review if needed.", "time": "5/13/26, 3:00 PM"}, {"id": 163, "sender": "them", "text": "If you need a real time check and notification between your ring and phone immediately you spend. I am afraid our current banking partners in the USA are still implementing this. Other countries are ahead of the USA unfortunately.", "time": "5/13/26, 3:01 PM"}, {"id": 164, "sender": "me", "text": "I understand the intended use case, and it’s actually the reason I chose to purchase the device. However, fully relying on it requires a level of trust that I am still in the process of building. Specifically, I need confidence that the app is functioning consistently and that transactions are being recorded accurately.", "time": "5/13/26, 3:16 PM"}, {"id": 165, "sender": "me", "text": "The delays I’ve experienced have made that more challenging, as discrepancies in the displayed balance have created uncertainty. While I recognize that checking the app after every transaction goes against the intended convenience of the ring, not doing so can make it difficult to feel assured that the balance is correct.", "time": "5/13/26, 3:16 PM"}, {"id": 166, "sender": "me", "text": "Additionally, I tend to monitor the app closely to avoid the possibility of the ring being declined at the point of sale. This creates a difficult balance between relying on the device as intended and ensuring that funds are available and transactions are properly tracked.", "time": "5/13/26, 3:16 PM"}, {"id": 167, "sender": "them", "text": "Sorry I am confused as to your request at the moment. As explained above, a screen-free smart ring is not built for real time updates or notification in the USA. At least not at the moment. We are dependent on banks and notifications there. Regardless, there would be a lag between the ring and phones. This may improve in the future when USA banks catch up. Again, the entire value proposition is to leave your phones and screens.\nDo you want to return the Orukka ring? If so, please advise your account number and we will transfer any balance. We will also process a refund after we receive the ring back. <This message was edited>", "time": "5/13/26, 3:41 PM"}, {"id": 168, "sender": "me", "text": "I understand.", "time": "5/14/26, 1:56 PM"}, {"id": 169, "sender": "me", "text": "As for returning the ring, I plan to let you know by the last day of the return period, May 17th.", "time": "5/14/26, 1:58 PM"}, {"id": 170, "sender": "me", "text": "I'm having another issue though now, another charge I don't recognize came up. This is about the third time this has happened. Why does this continue to happen? It says something about Los Angeles and I live in New York. Again, if I hadn't been checking and relying on the ring exclusively I'd be returning to the app and losing money. <This message was edited>", "time": "5/14/26, 1:59 PM"}, {"id": 171, "sender": "them", "text": "There is a reconciliation tonight. So it is possible that this is feed from the merchant or bank. It should be correct overnight. We will investigate this and correct if you still don’t recognise this tomorrow", "time": "5/14/26, 2:03 PM"}, {"id": 172, "sender": "them", "text": "Dear Mr Grannum,\nI cannot iterate this enough. Please as a consumer, if you are not happy with a wearable device, it is best to return it as soon as you realise that. Particularly if you have been given a free 30 day refund period, you should avail of it. It is also hard to see much changing between today and in 2 days time. There are three behaviourial patterns we notice that this payment ring might not be suitable for you.\n1) you rely on phone screens and near real time notifications which rings cannot provide.\n2) you are concerned with ad hoc reconciliations and pre authorisation which unfortunately is still prevalent in the US banking system for the near future.\n3) you mentioned concerns with topping up the ring which is specifically what the ring is designed for. To protect users form their primary accounts.\n4) the ring is designed more for travellers, athletes, students or professionals who are comfortable with full detachment from notifications. It also means a trust in the banking system reconciliations.\nIf you would like to try the ring further you may continue, but please note the 30 days cut off is automatic and is UK time zone. Not USA or EST <This message was edited>", "time": "5/14/26, 2:14 PM"}, {"id": 173, "sender": "me", "text": "Okay, I'll return it. Who pays for return shipping?", "time": "5/14/26, 2:21 PM"}, {"id": 174, "sender": "them", "text": "Great question in who pays for return shipping! You as the buyer pays.\nWhy? This depends on the reason for the return. Sellers pay if the item is damaged or faulty. Buyers pay if they change their mind. In this case, you can see that you constantly use the ring and pay for various items up till yesterday. So the core functionality of the ring works.\nYour return is because of updates on the app and notification which is actually the free part.\nIf you can please return to:\nFocus on Monesave\n50 Regent court\n1 North Bank\nNW8 8UN\nLondon.\nUnited Kingdom <This message was edited>", "time": "5/15/26, 1:18 AM"}, {"id": 175, "sender": "them", "text": "Please ensure it’s registered post so you have proof of postage. This protects you and us incase of loss of theft in the post. <This message was edited>", "time": "5/15/26, 1:37 AM"}, {"id": 176, "sender": "me", "text": "Understood, thanks for explaining it. In the meantime can you please update my final balance? I topped it up and made two purchases yet my balance is the same so I don't know how much is on the ring currently.", "time": "5/15/26, 7:03 AM"}, {"id": 177, "sender": "them", "text": "Your balance should have been updated in the past hour. Unfortunately for security reasons we cannot advise your balance.\nAlso please note your ring is disabled as you are turning the ring. Usually we withdraw your ring balance and transfer it to your nominated account. Are you still planning to use the ring again? Or you changed your mind?", "time": "5/15/26, 7:44 AM"}, {"id": 178, "sender": "me", "text": "I planned on using the ring to the very last day when I put in the mail. I really don't understand why it needed to be deactivated prior to that. Plus the balance still doesn't reflect the money I added or spent. As a consumer I'm really disappointed and I feel like I'm being blamed for not using the product as it is \"designed.\" It's a ring that I use to pay for things, the balance shouldn't be inconsistent with my spending, I shouldn't be seeing charges that I didn't make, I should be able to use it however I like. So your previous message really left a bad impression. I believed in the product and was excited to recommend it to people, but I don't see how I can do that now. Looking forward to returning it. I'll send it back ASAP. Can you make it so that I can use it in the next few days before I send it?", "time": "5/15/26, 7:49 AM"}, {"id": 179, "sender": "them", "text": "This is to confirm your ring is now reactivated. We deactivated it following your message last night.\nWe are sorry you feel this way as a customer. The product is designed to be used with NO reliance on phones or notifications. As a small niche company trying to change consumer behaviour, we realise it will take time for people to stop panicking and watching out for phones and bank notifications.\nThat being said, it is IMPRESSIVE that you plan on using the ring until the very last second of the return window. At a risk of abusing the release policy, we have to admire that you love the product but are concerned with the notifications and reconciliations. Again, that’s not the intended use of a payment ring.\nPlease use the ring and send us a message when we can deactivate the ring. Please note the ring is yours and we can only deactivate the ring when you tell us. But we are unable to deactivate the ring for full refund after the 30 day window is closed. <This message was edited>", "time": "5/15/26, 7:57 AM"}, {"id": 180, "sender": "me", "text": "My balance still isn't reflecting the top up; I believe there was $25 or so. I can't remember since that app wasn't updating. But I know for sure there was more then the $2.19 in there now. The ring will be postmarked on Monday, which is within the return period, please deactivate then.", "time": "5/15/26, 10:17 AM"}, {"id": 181, "sender": "me", "text": "Not sure how this abuses the release policy. I'm just using it and I wasn't fully satisfied with the experience so I'm returning it within the window. <This message was edited>", "time": "5/15/26, 10:18 AM"}, {"id": 182, "sender": "them", "text": "Ideally you should return a product the moment you decide that you do not want the product anymore. It’s bothers on abuse of the policy if you knowingly continue using the device after you claim you don’t like it.", "time": "5/15/26, 10:26 AM"}, {"id": 183, "sender": "them", "text": "When the device is closed on Monday, we will send you a summary of all top up and all transactions on the app. The amount could indeed be higher or lower. Particularly if you use Train tickets that are pre authorised. Or some restaurants that charge tips later specifically in the USA", "time": "5/15/26, 10:28 AM"}, {"id": 184, "sender": "them", "text": "Just to advise that your ring is currently overdrawn by 7.78 USD", "time": "5/15/26, 2:40 PM"}, {"id": 185, "sender": "me", "text": "Oh! Good to know. Thank you.", "time": "5/15/26, 2:41 PM"}, {"id": 186, "sender": "them", "text": "That’s why it’s risky to top up an exact amount and spend to the dollar", "time": "5/15/26, 2:41 PM"}, {"id": 187, "sender": "them", "text": "The top up was 15 and not 25", "time": "5/15/26, 2:41 PM"}, {"id": 188, "sender": "them", "text": "That might have caused the mix up", "time": "5/15/26, 2:41 PM"}, {"id": 189, "sender": "me", "text": "I didn't realize it could get over drawn. I thought it would just get declined.", "time": "5/15/26, 2:41 PM"}, {"id": 190, "sender": "them", "text": "That’s the only anti embarrassment feature we have for our customers. The last payment is allowed", "time": "5/15/26, 2:42 PM"}, {"id": 191, "sender": "them", "text": "🙏", "time": "5/15/26, 2:42 PM"}, {"id": 192, "sender": "them", "text": "And then usually our customers top up via regular transfer or direct debit", "time": "5/15/26, 2:42 PM"}, {"id": 193, "sender": "me", "text": "I understand, thanks for explaining that.", "time": "5/15/26, 9:38 PM"}, {"id": 194, "sender": "me", "text": "Just to add in something that I thought was strange was that the math didn't add up for me to have  overdrafted. I purposely waited until all of the charges had cleared before topping up yesterday so that I would have at least $30 because I wanted to avoid overspending.  after topping up, it never went over $15. I have screenshots. I'm not concerned now though because I'm cutting my losses. I just want to know though, will there be any more policy changes or any other things I need to know about as I return it? I really don't want any surprises. I've got a ring box to put it in to make sure it gets to you securely, and I'm going to get insurance and tracking on it so you can be updated along the way. I just want to be done. So please let me know if there's anything else that will prevent me from getting the $319 back. How do you want to handle the overdraft issue? I think that's an error, but like I said I just want this all done with, so please let me know.", "time": "5/15/26, 9:42 PM"}, {"id": 195, "sender": "me", "text": "<Media omitted>", "time": "5/15/26, 9:42 PM"}, {"id": 196, "sender": "me", "text": "Prior to the top up.", "time": "5/15/26, 9:42 PM"}, {"id": 197, "sender": "me", "text": "<Media omitted>", "time": "5/15/26, 9:42 PM"}, {"id": 198, "sender": "me", "text": "That never got added on. But, like I said I just want this to be over with and to receive the refund.", "time": "5/15/26, 9:44 PM"}, {"id": 199, "sender": "them", "text": "<Media omitted>", "time": "5/16/26, 5:37 AM"}, {"id": 200, "sender": "them", "text": "You balance was 2.19", "time": "5/16/26, 5:37 AM"}, {"id": 201, "sender": "them", "text": "And then you topped up 15.17", "time": "5/16/26, 5:37 AM"}, {"id": 202, "sender": "them", "text": "But spent over -25.68", "time": "5/16/26, 5:37 AM"}, {"id": 203, "sender": "them", "text": "That left you overdrawn", "time": "5/16/26, 5:37 AM"}, {"id": 204, "sender": "them", "text": "In terms of payment ring, it is really risky to spend and plan to the very dollar", "time": "5/16/26, 5:38 AM"}, {"id": 205, "sender": "them", "text": "With an unauthorised overdraft, it accrues interest all the way till the ring is received which could have a negative impact on your credit rating", "time": "5/16/26, 5:39 AM"}, {"id": 206, "sender": "them", "text": "In this instance, we will completely wave any overdraft fees.", "time": "5/16/26, 5:39 AM"}, {"id": 207, "sender": "them", "text": "When the ring is recieved with no damage of scratches, we can access the condition and also deduct your overdraft from there? Is that fair?", "time": "5/16/26, 5:40 AM"}, {"id": 208, "sender": "them", "text": "Again, I cannot emphasize enough. This is not how payment rings are design to be used where you top up exactly 10 USD and expect to spend exactly 10USD. Issues like delayed payment or preauthorised payments can occur", "time": "5/16/26, 5:41 AM"}, {"id": 209, "sender": "them", "text": "We will also send a full breakdown of your expenses and exactly what you topped up by. Please review and let us know if anything is confusing there <This message was edited>", "time": "5/16/26, 5:42 AM"}, {"id": 210, "sender": "them", "text": "It is rather disappointing that you end up spending overdraft and owing the community. We allow customers to overdrawn because we trust our community. We are a small community and startup so we have never seen a case where people owe money to the community and try to offset it with a ring that’s not yet recieved", "time": "5/16/26, 5:45 AM"}, {"id": 211, "sender": "them", "text": "Regarding your question, on what else could go wrong, it is possible that the ring gets lost or stolen in transit. So please ensure it is registered. We have only had one case in Brazil where this happened. So that’s bother risk that we can both carry. Where the ring is stolen and used. And you still owe us.", "time": "5/16/26, 5:46 AM"}, {"id": 212, "sender": "them", "text": "A full breakdown of costs and topups have now been shared via email. Just want to apologise how things went down here. We are a small startup with less than 6 month launching with big banks. So we are still learning and building experiences.\nWe will work on more real time updates between the bank and customers.\nWe will work on blocking the rings immediately a customer goes overdrawn.\nAnd finally, we hope to receive the ring back and perhaps welcome you in future when we are more mature and established.", "time": "5/16/26, 7:32 AM"}, {"id": 213, "sender": "me", "text": "", "time": "5/16/26, 9:42 AM"}, {"id": 214, "sender": "me", "text": "Hi, thanks for your message. Please call when you get a moment.", "time": "5/16/26, 9:45 AM"}, {"id": 215, "sender": "me", "text": "I'd like to speak to Patrick.", "time": "5/16/26, 9:45 AM"}, {"id": 216, "sender": "them", "text": "As you probably saw online and the press, Patrick and the founders are raising investment from the community and banks. They are travelling this week and next. They might reach out if in your city.", "time": "5/16/26, 10:41 AM"}, {"id": 217, "sender": "them", "text": "He comes online and will revert if time permits over the next few days", "time": "5/16/26, 10:41 AM"}, {"id": 218, "sender": "me", "text": "They might reach out if in your city? What does that even mean? Looks like a typo.", "time": "5/16/26, 11:00 AM"}, {"id": 219, "sender": "me", "text": "He comes online and will revert if time permits? What does that mean?", "time": "5/16/26, 11:00 AM"}, {"id": 220, "sender": "them", "text": "That’s not a typo. Do you realise this is a customer service line? Also don’t understand what raising money across cities mean? If not we can explain", "time": "5/16/26, 11:05 AM"}, {"id": 221, "sender": "them", "text": "The founders meeting customers and raising money. Usually they help with customer service but not this weekend or next.", "time": "5/16/26, 11:06 AM"}, {"id": 222, "sender": "them", "text": "What is your query? We can help", "time": "5/16/26, 11:07 AM"}, {"id": 223, "sender": "them", "text": "If not, Patrick or one of the founder will call you. But we said above, they are raising investments his week and next", "time": "5/16/26, 11:08 AM"}, {"id": 224, "sender": "me", "text": "I understand this is a customer service line. However, Patrick was the first person I spoke to when I reached out using this line. He and I spoke for 20 minutes. He addressed all my concerns and now I would like for him to do the same. I'm being told conflicting things and it's costing me money and time to navigate this with you. If he can't get on the phone, please have someone call me. On the website it says that you all are available via phone, email and text message. <This message was edited>", "time": "5/16/26, 11:15 AM"}, {"id": 225, "sender": "me", "text": "I need the answers in a timely fashion and I don't have the time to message back and forth as we've been doing. We can speak on the phone and then you can send a follow-up email or message confirming what we've discussed.", "time": "5/16/26, 11:16 AM"}, {"id": 226, "sender": "them", "text": "This will be passed on to Patrick. But as said above. He is travelling so expect some delays <This message was edited>", "time": "5/16/26, 11:22 AM"}, {"id": 227, "sender": "me", "text": "Great, thanks for passing along my message to Patrick.", "time": "5/16/26, 11:34 AM"}, {"id": 228, "sender": "me", "text": "Final points I'd like to address.", "time": "5/16/26, 11:35 AM"}, {"id": 229, "sender": "me", "text": "This message stated I overdrafted by $7.78 and that only the last payment is allowed. Now I'm seeing  I've overdrafted by $68.26 in my email. How is this possible?", "time": "5/16/26, 11:38 AM"}, {"id": 230, "sender": "me", "text": "- In the email ring balance email it says _\"There is no further action from your end for now as you have requested to offset your overdraft against the cost of your ring return.\"_ When/where did I request that?", "time": "5/16/26, 11:40 AM"}, {"id": 231, "sender": "me", "text": "- In the case of interest, that's not mentioned anywhere on the website. Moreover, there's no mention of an interest rate. So how could I be charged interest if it's not clearly stated?", "time": "5/16/26, 11:41 AM"}, {"id": 232, "sender": "me", "text": "Thanks again for confirming this. The original form of payment was my credit card. Will I receive it there?", "time": "5/16/26, 11:43 AM"}, {"id": 233, "sender": "me", "text": "As for the apology, thanks for the acknowledgment of difficulty with the ring. I do hope that you all get to achieve what you all are envisioning for the product. I'm glad I gave it a shot and I hope my feedback benefits future customers.", "time": "5/16/26, 11:45 AM"}, {"id": 234, "sender": "me", "text": "<Media omitted>", "time": "5/16/26, 11:47 AM"}, {"id": 235, "sender": "me", "text": "With Monesave not being a bank, as it states in the app, how are you all charging interest?", "time": "5/16/26, 11:47 AM"}, {"id": 236, "sender": "them", "text": "There was an attachment on the email. Did you review that? The attachment shows the specific times you spent over the past month. With your account closing at 12pm tonight, we reached out to all the merchants and finalise any transactions and send  us a report.", "time": "5/16/26, 12:42 PM"}, {"id": 237, "sender": "them", "text": "Our understanding was that you would like to offset the cost. If that’s not the case, then please top up your ring to night to bring your account to 0", "time": "5/16/26, 12:44 PM"}, {"id": 238, "sender": "them", "text": "This is a moot point because we specifically said you’re NOT being charged any interest. So there is nothing to address here.", "time": "5/16/26, 12:45 PM"}, {"id": 239, "sender": "them", "text": "Again, there is no interest being charge to you. But if you just want to understand, when a customers account goes overdrawn, we are charged interest. That needs to be passed on to the customer others we would go bankrupt if every customer went overdrawn", "time": "5/16/26, 12:47 PM"}, {"id": 240, "sender": "them", "text": "But luckily to date, we don’t have any customer going overdrawn and not paying back on the same day", "time": "5/16/26, 12:48 PM"}, {"id": 241, "sender": "them", "text": "In this your case, your account will be overdrawn for at least a few days. We would cover the interest from the bank", "time": "5/16/26, 12:49 PM"}, {"id": 242, "sender": "them", "text": "To clarify, we are not a bank
